<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="64" y1="0" x2="64" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14141a"/>
      <stop offset="1" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="blood" x1="64" y1="24" x2="64" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f03528"/>
      <stop offset="0.55" stop-color="#c41e18"/>
      <stop offset="1" stop-color="#6e0e0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="64" cy="58" r="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d91f1a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d91f1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Arka plan -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <rect x="3" y="3" width="122" height="122" rx="20" fill="none" stroke="#2a2828" stroke-width="1.5"/>

  <!-- Hafif kirmizi aura -->
  <circle cx="64" cy="58" r="44" fill="url(#glow)"/>

  <!-- Hollow halka — kirilmis, PSX hissi -->
  <circle cx="64" cy="58" r="34" fill="none" stroke="url(#blood)" stroke-width="5.5" stroke-linecap="square" stroke-dasharray="168 36" transform="rotate(-18 64 58)"/>

  <!-- Ortadaki bosluk (HOLLOWED) -->
  <circle cx="64" cy="58" r="21" fill="#050508"/>
  <circle cx="64" cy="58" r="21" fill="none" stroke="#1a1010" stroke-width="1"/>

  <!-- Dikey catlak / damla -->
  <path fill="#9a1814" d="M64 76 L60 92 L64 100 L68 92 Z"/>
  <rect x="62.5" y="52" width="3" height="26" fill="#7a1210" opacity="0.85"/>

  <!-- Alt ince cizgi (scanline hissi) -->
  <rect x="22" y="108" width="84" height="2" fill="#3d3a36" opacity="0.55"/>
  <rect x="30" y="112" width="68" height="1" fill="#2a2826" opacity="0.4"/>
</svg>
